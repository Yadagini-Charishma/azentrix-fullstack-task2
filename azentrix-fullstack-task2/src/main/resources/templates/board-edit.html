<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Settings — TaskFlow</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #3f37c9;
            --accent: #f72585;
            --dark: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--dark);
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .navbar-custom {
            background: var(--surface);
            border-bottom: 1px solid rgba(108,99,255,0.3);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-brand { font-size: 1.4rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .navbar-brand span { color: var(--accent); }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        .btn-sm-custom {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-back { background: rgba(255,255,255,0.08); color: #ccc; }
        .btn-back:hover { background: rgba(255,255,255,0.15); color: white; }

        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
        }
        .page-header h1 span { color: var(--primary); }
        .page-header p { color: #666; font-size: 0.9rem; margin-top: 4px; }

        .settings-card {
            background: var(--surface);
            border: 1px solid rgba(108,99,255,0.2);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .settings-card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .settings-card-title i { color: var(--primary); }

        .form-control, .form-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 8px;
            padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(108,99,255,0.1);
            border-color: var(--primary);
            color: #fff;
            box-shadow: none;
        }
        .form-select option { background: #16213e; }
        .form-label { color: #bbb; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; display: block; }

        .btn-save {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 0.9rem;
        }
        .btn-save:hover { transform: translateY(-1px); }

        /* Members list */
        .member-list { display: flex; flex-direction: column; gap: 10px; }
        .member-item {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .member-info { display: flex; align-items: center; gap: 12px; }
        .member-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            text-transform: uppercase;
        }
        .member-name { font-weight: 600; font-size: 0.9rem; }
        .member-email { color: #666; font-size: 0.78rem; }
        .member-role {
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
        }
        .role-admin { background: rgba(247,37,133,0.15); color: var(--accent); }
        .role-member { background: rgba(108,99,255,0.15); color: var(--primary); }
        .btn-remove {
            background: rgba(247,37,133,0.12);
            border: 1px solid rgba(247,37,133,0.25);
            color: var(--accent);
            border-radius: 7px;
            padding: 5px 12px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-remove:hover { background: var(--accent); color: white; }
        .creator-badge {
            background: rgba(6,214,160,0.12);
            color: #06d6a0;
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
        }

        /* Add member section */
        .add-member-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .add-member-row .form-select { flex: 1; }
        .btn-add-member {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: transform 0.2s;
        }
        .btn-add-member:hover { transform: translateY(-1px); }

        .empty-members {
            text-align: center;
            padding: 24px;
            color: #555;
            font-size: 0.9rem;
        }

        /* Danger zone */
        .danger-card {
            background: rgba(247,37,133,0.05);
            border: 1px solid rgba(247,37,133,0.2);
            border-radius: 16px;
            padding: 24px;
        }
        .danger-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .danger-desc { color: #888; font-size: 0.85rem; margin-bottom: 16px; }
        .btn-danger {
            background: rgba(247,37,133,0.15);
            border: 1px solid rgba(247,37,133,0.4);
            color: var(--accent);
            border-radius: 8px;
            padding: 9px 20px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-danger:hover { background: var(--accent); color: white; }

        @media (max-width: 600px) {
            .add-member-row { flex-direction: column; }
            .member-item { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar-custom">
        <a href="/dashboard" class="navbar-brand">Task<span>Flow</span></a>
        <div class="nav-right">
            <a th:href="@{/boards/{id}(id=${board.id})}" class="btn-sm-custom btn-back">
                <i class="fas fa-arrow-left"></i> Back to Board
            </a>
        </div>
    </nav>

    <div class="main-content">

        <!-- Page Header -->
        <div class="page-header">
            <h1>Board <span>Settings</span></h1>
            <p>Manage your board details and members</p>
        </div>

        <!-- Edit Board Details -->
        <div class="settings-card">
            <div class="settings-card-title">
                <i class="fas fa-edit"></i> Board Details
            </div>
            <form th:action="@{/boards/{id}/edit(id=${board.id})}"
                  th:object="${boardDTO}" method="post">
                <div class="mb-3">
                    <label class="form-label">Board Name *</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           placeholder="Board name" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"
                              placeholder="What is this board for?"></textarea>
                </div>
                <button type="submit" class="btn-save">
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
            </form>
        </div>

        <!-- Members Management -->
        <div class="settings-card">
            <div class="settings-card-title">
                <i class="fas fa-users"></i>
                Members
                <span style="background:rgba(108,99,255,0.15); color:var(--primary);
                             font-size:0.75rem; padding:2px 8px; border-radius:10px; font-weight:700;"
                      th:text="${#lists.size(currentMembers)}">0</span>
            </div>

            <!-- Current Members List -->
            <div class="member-list">
                <div th:if="${#lists.isEmpty(currentMembers)}" class="empty-members">
                    No members yet
                </div>
                <div th:each="member : ${currentMembers}" class="member-item">
                    <div class="member-info">
                        <div class="member-avatar"
                             th:text="${#strings.substring(member.username, 0, 1)}">A</div>
                        <div>
                            <div class="member-name" th:text="${member.username}">username</div>
                            <div class="member-email" th:text="${member.email}">email</div>
                        </div>
                        <span class="member-role"
                              th:classappend="${member.role.name() == 'ROLE_ADMIN'} ? 'role-admin' : 'role-member'"
                              th:text="${member.role.name() == 'ROLE_ADMIN'} ? 'Admin' : 'Member'">Role</span>
                        <span th:if="${member.id == board.createdBy.id}" class="creator-badge">
                            👑 Creator
                        </span>
                    </div>
                    <!-- Remove button (don't show for board creator) -->
                    <form th:if="${member.id != board.createdBy.id}"
                          th:action="@{/boards/{bid}/members/remove(bid=${board.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden" name="userId" th:value="${member.id}">
                        <button type="submit" class="btn-remove"
                                onclick="return confirm('Remove this member from board?')">
                            <i class="fas fa-user-minus me-1"></i>Remove
                        </button>
                    </form>
                    <span th:if="${member.id == board.createdBy.id}"
                          style="color:#444; font-size:0.78rem;">Cannot remove</span>
                </div>
            </div>

            <!-- Add Member -->
            <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06);">
                <label class="form-label"><i class="fas fa-user-plus me-1"></i>Add New Member</label>
                <form th:action="@{/boards/{bid}/members/add(bid=${board.id})}"
                      method="post">
                    <div class="add-member-row">
                        <select name="userId" class="form-select" required>
                            <option value="">-- Select a user to add --</option>
                            <option th:each="user : ${allUsers}"
                                    th:if="${!#lists.contains(currentMembers, user)}"
                                    th:value="${user.id}"
                                    th:text="${user.username} + ' (' + ${user.email} + ')'">
                                user
                            </option>
                        </select>
                        <button type="submit" class="btn-add-member">
                            <i class="fas fa-plus me-1"></i>Add Member
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Danger Zone -->
        <div class="danger-card">
            <div class="danger-title">
                <i class="fas fa-exclamation-triangle"></i> Danger Zone
            </div>
            <p class="danger-desc">
                Deleting this board will permanently remove all tasks and data inside it. This cannot be undone.
            </p>
            <form th:action="@{/boards/{id}/delete(id=${board.id})}"
                  method="post" style="display:inline;">
                <button type="submit" class="btn-danger"
                        onclick="return confirm('DELETE this entire board and ALL its tasks? This cannot be undone!')">
                    <i class="fas fa-trash me-2"></i>Delete This Board
                </button>
            </form>
        </div>

    </div>

</body>
</html>
