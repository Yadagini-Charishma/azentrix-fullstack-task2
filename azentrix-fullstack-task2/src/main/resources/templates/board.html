<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.name} + ' — TaskFlow'">Board</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #3f37c9;
            --accent: #f72585;
            --dark: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --todo: #4361ee;
            --inprog: #f77f00;
            --done: #06d6a0;
        }
        * { box-sizing: border-box; }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar-custom {
            background: var(--surface);
            border-bottom: 1px solid rgba(108,99,255,0.3);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .navbar-brand { font-size: 1.4rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .navbar-brand span { color: var(--accent); }
        .board-title { font-size: 1rem; font-weight: 600; color: #ccc; }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        .btn-sm-custom {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-back { background: rgba(255,255,255,0.08); color: #ccc; }
        .btn-back:hover { background: rgba(255,255,255,0.15); color: white; }
        .btn-logout { background: rgba(247,37,133,0.15); color: var(--accent); border: 1px solid rgba(247,37,133,0.3); }
        .btn-logout:hover { background: var(--accent); color: white; }

        .board-area {
            flex: 1;
            padding: 24px;
            overflow-x: auto;
        }
        .board-header {
            margin-bottom: 24px;
        }
        .board-header h2 { font-size: 1.6rem; font-weight: 800; }
        .board-header p { color: #666; font-size: 0.9rem; }

        .columns-wrapper {
            display: flex;
            gap: 20px;
            min-width: fit-content;
        }

        .column {
            background: var(--surface);
            border-radius: 16px;
            width: 320px;
            min-width: 320px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 200px);
        }
        .column-header {
            padding: 16px 20px;
            border-radius: 16px 16px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .column-header.todo { border-top: 3px solid var(--todo); }
        .column-header.inprog { border-top: 3px solid var(--inprog); }
        .column-header.done { border-top: 3px solid var(--done); }

        .column-title { font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }
        .col-dot { width: 10px; height: 10px; border-radius: 50%; }
        .col-dot.todo { background: var(--todo); }
        .col-dot.inprog { background: var(--inprog); }
        .col-dot.done { background: var(--done); }
        .col-count {
            background: rgba(255,255,255,0.08);
            color: #888;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .cards-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .task-card {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            border-color: rgba(108,99,255,0.4);
        }
        .task-card-title { font-weight: 600; font-size: 0.92rem; margin-bottom: 6px; line-height: 1.3; }
        .task-card-desc { color: #777; font-size: 0.8rem; margin-bottom: 10px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-card-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .priority-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .priority-LOW { background: rgba(6,214,160,0.15); color: #06d6a0; }
        .priority-MEDIUM { background: rgba(247,127,0,0.15); color: #f77f00; }
        .priority-HIGH { background: rgba(247,37,133,0.15); color: #f72585; }
        .priority-URGENT { background: rgba(230,0,0,0.2); color: #ff4444; }
        .assignee-tag { display: flex; align-items: center; gap: 5px; color: #888; font-size: 0.78rem; }
        .due-tag { color: #777; font-size: 0.78rem; }
        .task-actions { display: flex; gap: 6px; margin-top: 10px; }
        .task-btn {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }
        .task-btn-edit { background: rgba(108,99,255,0.15); color: var(--primary); }
        .task-btn-edit:hover { background: var(--primary); color: white; }
        .task-btn-delete { background: rgba(247,37,133,0.12); color: var(--accent); }
        .task-btn-delete:hover { background: var(--accent); color: white; }
        .task-btn-move { background: rgba(6,214,160,0.12); color: #06d6a0; }
        .task-btn-move:hover { background: #06d6a0; color: #000; }

        .add-task-section { padding: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
        .btn-add-task {
            width: 100%;
            background: rgba(108,99,255,0.1);
            border: 1px dashed rgba(108,99,255,0.3);
            color: var(--primary);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add-task:hover { background: rgba(108,99,255,0.2); border-style: solid; }

        /* Modal */
        .modal-content {
            background: var(--surface);
            border: 1px solid rgba(108,99,255,0.3);
            border-radius: 16px;
            color: #e0e0e0;
        }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.08); }
        .modal-footer { border-top: 1px solid rgba(255,255,255,0.08); }
        .modal-title { font-weight: 700; color: white; }
        .form-control, .form-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(108,99,255,0.1);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 0 0 2px rgba(108,99,255,0.2);
        }
        .form-select option { background: var(--surface2); color: white; }
        .form-label { color: #ccc; font-size: 0.85rem; font-weight: 600; }
        .btn-close { filter: invert(1); }
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* Live badge */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(6,214,160,0.12);
            border: 1px solid rgba(6,214,160,0.3);
            color: #06d6a0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .live-dot {
            width: 7px;
            height: 7px;
            background: #06d6a0;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .toast-notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid rgba(108,99,255,0.4);
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-size: 0.9rem;
            display: none;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            max-width: 320px;
        }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .columns-wrapper { flex-direction: column; min-width: unset; }
            .column { width: 100%; min-width: unset; max-height: unset; }
            .board-area { padding: 12px; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar-custom">
        <div style="display:flex; align-items:center; gap: 16px;">
            <a href="/dashboard" class="navbar-brand">Task<span>Flow</span></a>
            <span style="color:#444;">/</span>
            <span class="board-title" th:text="${board.name}">Board</span>
        </div>
        <div class="nav-right">
            <span class="live-badge"><span class="live-dot"></span>Live</span>
            <a href="/dashboard" class="btn-sm-custom btn-back"><i class="fas fa-arrow-left me-1"></i>Dashboard</a>
            <a href="/auth/logout" class="btn-sm-custom btn-logout"><i class="fas fa-sign-out-alt me-1"></i>Logout</a>
        </div>
    </nav>

    <!-- Board Area -->
    <div class="board-area">
        <div class="board-header">
            <h2 th:text="${board.name}">Board Name</h2>
            <p th:text="${board.description}">Description</p>
        </div>

        <div class="columns-wrapper">

            <!-- TO DO Column -->
            <div class="column">
                <div class="column-header todo">
                    <div class="column-title">
                        <span class="col-dot todo"></span>
                        To Do
                    </div>
                    <span class="col-count" th:text="${#lists.size(todoTasks)}">0</span>
                </div>
                <div class="cards-container" id="col-TODO">
                    <div th:each="task : ${todoTasks}"
                         th:id="'card-' + ${task.id}"
                         class="task-card">
                        <div class="task-card-title" th:text="${task.title}">Task Title</div>
                        <div class="task-card-desc" th:text="${task.description}">Description</div>
                        <div class="task-card-meta">
                            <span class="priority-badge"
                                  th:classappend="'priority-' + ${task.priority}"
                                  th:text="${task.priority}">MEDIUM</span>
                            <span class="assignee-tag" th:if="${task.assignee != null}">
                                <i class="fas fa-user-circle"></i>
                                <span th:text="${task.assignee.username}">user</span>
                            </span>
                        </div>
                        <div class="due-tag mt-1" th:if="${task.dueDate != null}">
                            <i class="fas fa-calendar-alt me-1"></i>
                            <span th:text="${task.dueDate}">2024-01-01</span>
                        </div>
                        <div class="task-actions">
                            <a th:href="@{/boards/{bid}/tasks/{tid}/edit(bid=${board.id}, tid=${task.id})}"
                               class="task-btn task-btn-edit">
                                <i class="fas fa-edit"></i> Edit
                            </a>
                            <button class="task-btn task-btn-move"
                                    th:onclick="'moveTask(' + ${task.id} + ', \'IN_PROGRESS\')'">
                                → In Progress
                            </button>
                            <form th:action="@{/boards/{bid}/tasks/{tid}/delete(bid=${board.id}, tid=${task.id})}"
                                  method="post" style="display:inline;"
                                  onsubmit="return confirm('Delete this task?')">
                                <button type="submit" class="task-btn task-btn-delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="add-task-section">
                    <button class="btn-add-task" data-bs-toggle="modal" data-bs-target="#addTaskModal"
                            onclick="setDefaultStatus('TODO')">
                        <i class="fas fa-plus me-1"></i> Add Task
                    </button>
                </div>
            </div>

            <!-- IN PROGRESS Column -->
            <div class="column">
                <div class="column-header inprog">
                    <div class="column-title">
                        <span class="col-dot inprog"></span>
                        In Progress
                    </div>
                    <span class="col-count" th:text="${#lists.size(inProgressTasks)}">0</span>
                </div>
                <div class="cards-container" id="col-IN_PROGRESS">
                    <div th:each="task : ${inProgressTasks}"
                         th:id="'card-' + ${task.id}"
                         class="task-card">
                        <div class="task-card-title" th:text="${task.title}">Task Title</div>
                        <div class="task-card-desc" th:text="${task.description}">Description</div>
                        <div class="task-card-meta">
                            <span class="priority-badge"
                                  th:classappend="'priority-' + ${task.priority}"
                                  th:text="${task.priority}">MEDIUM</span>
                            <span class="assignee-tag" th:if="${task.assignee != null}">
                                <i class="fas fa-user-circle"></i>
                                <span th:text="${task.assignee.username}">user</span>
                            </span>
                        </div>
                        <div class="due-tag mt-1" th:if="${task.dueDate != null}">
                            <i class="fas fa-calendar-alt me-1"></i>
                            <span th:text="${task.dueDate}">2024-01-01</span>
                        </div>
                        <div class="task-actions">
                            <a th:href="@{/boards/{bid}/tasks/{tid}/edit(bid=${board.id}, tid=${task.id})}"
                               class="task-btn task-btn-edit">
                                <i class="fas fa-edit"></i> Edit
                            </a>
                            <button class="task-btn task-btn-move"
                                    th:onclick="'moveTask(' + ${task.id} + ', \'DONE\')'">
                                → Done
                            </button>
                            <form th:action="@{/boards/{bid}/tasks/{tid}/delete(bid=${board.id}, tid=${task.id})}"
                                  method="post" style="display:inline;"
                                  onsubmit="return confirm('Delete this task?')">
                                <button type="submit" class="task-btn task-btn-delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="add-task-section">
                    <button class="btn-add-task" data-bs-toggle="modal" data-bs-target="#addTaskModal"
                            onclick="setDefaultStatus('IN_PROGRESS')">
                        <i class="fas fa-plus me-1"></i> Add Task
                    </button>
                </div>
            </div>

            <!-- DONE Column -->
            <div class="column">
                <div class="column-header done">
                    <div class="column-title">
                        <span class="col-dot done"></span>
                        Done
                    </div>
                    <span class="col-count" th:text="${#lists.size(doneTasks)}">0</span>
                </div>
                <div class="cards-container" id="col-DONE">
                    <div th:each="task : ${doneTasks}"
                         th:id="'card-' + ${task.id}"
                         class="task-card" style="opacity:0.8;">
                        <div class="task-card-title" style="text-decoration:line-through; color:#666;"
                             th:text="${task.title}">Task Title</div>
                        <div class="task-card-desc" th:text="${task.description}">Description</div>
                        <div class="task-card-meta">
                            <span class="priority-badge"
                                  th:classappend="'priority-' + ${task.priority}"
                                  th:text="${task.priority}">MEDIUM</span>
                            <span style="color:#06d6a0; font-size:0.8rem;"><i class="fas fa-check-circle me-1"></i>Done</span>
                        </div>
                        <div class="task-actions">
                            <button class="task-btn task-btn-move"
                                    th:onclick="'moveTask(' + ${task.id} + ', \'TODO\')'">
                                ↩ Reopen
                            </button>
                            <form th:action="@{/boards/{bid}/tasks/{tid}/delete(bid=${board.id}, tid=${task.id})}"
                                  method="post" style="display:inline;"
                                  onsubmit="return confirm('Delete this task?')">
                                <button type="submit" class="task-btn task-btn-delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="add-task-section">
                    <button class="btn-add-task" data-bs-toggle="modal" data-bs-target="#addTaskModal"
                            onclick="setDefaultStatus('DONE')">
                        <i class="fas fa-plus me-1"></i> Add Task
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal fade" id="addTaskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus-circle me-2" style="color:var(--primary)"></i>Add New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/boards/{id}/tasks/new(id=${board.id})}"
                      th:object="${taskDTO}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input type="text" th:field="*{title}" class="form-control"
                                   placeholder="Task title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"
                                      placeholder="Describe the task..."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Status</label>
                                <select th:field="*{status}" class="form-select" id="taskStatusSelect">
                                    <option value="TODO">📋 To Do</option>
                                    <option value="IN_PROGRESS">⚡ In Progress</option>
                                    <option value="DONE">✅ Done</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Priority</label>
                                <select th:field="*{priority}" class="form-select">
                                    <option value="LOW">🟢 Low</option>
                                    <option value="MEDIUM" selected>🟡 Medium</option>
                                    <option value="HIGH">🔴 High</option>
                                    <option value="URGENT">🚨 Urgent</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Assignee</label>
                                <select th:field="*{assigneeId}" class="form-select">
                                    <option value="">-- Unassigned --</option>
                                    <option th:each="member : ${allUsers}"
                                            th:value="${member.id}"
                                            th:text="${member.username}">user</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Due Date</label>
                                <input type="date" th:field="*{dueDate}" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn-primary-custom">
                            <i class="fas fa-plus me-1"></i>Create Task
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast notification for real-time updates -->
    <div class="toast-notification" id="toastNotification">
        <i class="fas fa-bell me-2" style="color:var(--primary)"></i>
        <span id="toastMessage">Board updated</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script th:inline="javascript">
        var boardId = /*[[${board.id}]]*/ 0;

        // Move task via AJAX
        function moveTask(taskId, newStatus) {
            fetch('/boards/' + boardId + '/tasks/' + taskId + '/status?status=' + newStatus, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            }).then(function() {
                location.reload();
            });
        }

        // Set default status for modal
        function setDefaultStatus(status) {
            document.getElementById('taskStatusSelect').value = status;
        }

        // WebSocket connection
        var socket = new SockJS('/ws');
        var stompClient = Stomp.over(socket);
        stompClient.debug = null; // silence logs

        stompClient.connect({}, function(frame) {
            stompClient.subscribe('/topic/board/' + boardId, function(message) {
                var update = JSON.parse(message.body);
                showToast(update.updatedBy + ' ' + update.action.toLowerCase() + 'd a task: ' + (update.title || ''));
                // Auto-reload after 1.5s for simplicity
                setTimeout(function() { location.reload(); }, 1500);
            });
        }, function(error) {
            console.log('WebSocket connection failed (non-critical):', error);
        });

        function showToast(msg) {
            var toast = document.getElementById('toastNotification');
            document.getElementById('toastMessage').textContent = msg;
            toast.style.display = 'block';
            setTimeout(function() { toast.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
