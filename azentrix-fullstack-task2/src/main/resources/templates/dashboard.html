<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — TaskFlow</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #3f37c9;
            --accent: #f72585;
            --dark: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --text: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .navbar-custom {
            background: var(--surface);
            border-bottom: 1px solid rgba(108,99,255,0.3);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-brand { font-size: 1.6rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .navbar-brand span { color: var(--accent); }
        .nav-links { display: flex; align-items: center; gap: 16px; }
        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover { background: rgba(108,99,255,0.2); color: var(--primary); }
        .nav-links a.admin-link { color: var(--accent); }
        .logout-btn {
            background: rgba(247,37,133,0.15);
            border: 1px solid rgba(247,37,133,0.3);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: var(--accent); color: white; }
        .main-content { padding: 32px; max-width: 1200px; margin: 0 auto; }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-title { font-size: 1.8rem; font-weight: 700; }
        .page-title span { color: var(--primary); }
        .btn-new-board {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-new-board:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108,99,255,0.4);
            color: white;
        }
        .boards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .board-card {
            background: var(--surface);
            border: 1px solid rgba(108,99,255,0.2);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            text-decoration: none;
            color: var(--text);
            display: block;
        }
        .board-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(108,99,255,0.25);
            border-color: var(--primary);
            color: var(--text);
        }
        .board-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 1.3rem;
            color: white;
        }
        .board-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
        .board-desc { color: #888; font-size: 0.85rem; margin-bottom: 16px; line-height: 1.4; }
        .board-meta { display: flex; align-items: center; gap: 12px; }
        .board-meta-item { display: flex; align-items: center; gap: 5px; color: #666; font-size: 0.8rem; }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #555;
        }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; color: #333; }
        .empty-state h3 { font-size: 1.4rem; color: #777; margin-bottom: 12px; }
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid rgba(108,99,255,0.2);
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .stat-icon {
            width: 40px;
            height: 40px;
            background: rgba(108,99,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.1rem;
        }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: white; }
        .stat-label { font-size: 0.8rem; color: #888; }
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(108,99,255,0.15);
            border: 1px solid rgba(108,99,255,0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.85rem;
            color: var(--primary);
        }
        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .stats-bar { flex-wrap: wrap; }
            .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar-custom">
        <a href="/dashboard" class="navbar-brand">Task<span>Flow</span></a>
        <div class="nav-links">
            <span class="user-badge">
                <i class="fas fa-circle" style="font-size:8px; color: #00e676;"></i>
                <span th:text="${user.username}">username</span>
                <span th:if="${user.role.name() == 'ROLE_ADMIN'}"
                      style="background: var(--accent); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 700;">ADMIN</span>
            </span>
            <a th:if="${user.role.name() == 'ROLE_ADMIN'}" href="/admin/users" class="admin-link">
                <i class="fas fa-users-cog me-1"></i>Manage Users
            </a>
            <a href="/auth/logout" class="logout-btn">
                <i class="fas fa-sign-out-alt me-1"></i>Logout
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-th-large"></i></div>
                <div>
                    <div class="stat-value" th:text="${boardCount}">0</div>
                    <div class="stat-label">Total Boards</div>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Your <span>Boards</span></h1>
                <p style="color:#666; margin-top:4px; font-size:0.9rem;">Manage your projects and tasks</p>
            </div>
            <a href="/boards/new" class="btn-new-board">
                <i class="fas fa-plus"></i> New Board
            </a>
        </div>

        <!-- Boards Grid -->
        <div th:if="${#lists.isEmpty(boards)}" class="empty-state">
            <i class="fas fa-clipboard-list"></i>
            <h3>No boards yet</h3>
            <p style="margin-bottom: 24px;">Create your first board to start organizing tasks</p>
            <a href="/boards/new" class="btn-new-board" style="display: inline-flex;">
                <i class="fas fa-plus"></i> Create Board
            </a>
        </div>

        <div th:if="${!#lists.isEmpty(boards)}" class="boards-grid">
            <a th:each="board : ${boards}"
               th:href="@{/boards/{id}(id=${board.id})}"
               class="board-card">
                <div class="board-icon">
                    <i class="fas fa-columns"></i>
                </div>
                <div class="board-name" th:text="${board.name}">Board Name</div>
                <div class="board-desc"
                     th:text="${board.description != null ? board.description : 'No description'}">
                    Description
                </div>
				<form th:action="@{/boards/{id}/delete(id=${board.id})}"
				      method="post" style="display:inline; float:right;">
				    <button type="submit"
				            onclick="return confirm('Delete this board and ALL its tasks?')"
				            style="background:rgba(247,37,133,0.15); border:1px solid rgba(247,37,133,0.3);
				                   color:#f72585; border-radius:8px; padding:4px 12px;
				                   font-size:0.78rem; cursor:pointer;">
				        <i class="fas fa-trash"></i> Delete
				    </button>
				</form>
                <div class="board-meta">
                    <div class="board-meta-item">
                        <i class="fas fa-users"></i>
                        <span th:text="${#lists.size(board.members)} + ' members'">0 members</span>
                    </div>
                    <div class="board-meta-item">
                        <i class="fas fa-user"></i>
                        <span th:text="'by ' + ${board.createdBy.username}">by user</span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
