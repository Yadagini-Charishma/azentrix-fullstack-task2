<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — TaskFlow</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #3f37c9;
            --accent: #f72585;
            --dark: #1a1a2e;
            --card-bg: #16213e;
        }
        body {
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .register-card {
            background: var(--card-bg);
            border: 1px solid rgba(108,99,255,0.3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(108,99,255,0.2);
        }
        .brand { font-size: 2rem; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 8px; }
        .brand span { color: var(--accent); }
        .subtitle { color: #888; text-align: center; margin-bottom: 32px; font-size: 0.9rem; }
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 10px;
            padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(108,99,255,0.1);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
        }
        .form-label { color: #ccc; font-size: 0.85rem; font-weight: 600; }
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); }
        .login-link { color: #888; text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .alert-danger-custom {
            background: rgba(247,37,133,0.15);
            border: 1px solid rgba(247,37,133,0.4);
            color: #f72585;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .input-group-text {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-right: none;
            color: var(--primary);
        }
        .form-control.with-icon { border-left: none; }
        .hint { color: #666; font-size: 0.78rem; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="brand">Task<span>Flow</span></div>
        <div class="subtitle">Create your account</div>

        <div th:if="${error}" class="alert-danger-custom">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        </div>

        <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" th:field="*{username}" class="form-control with-icon"
                           placeholder="Choose a username" required>
                </div>
                <small th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                       class="text-danger"></small>
                <div class="hint">3–50 characters</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" th:field="*{email}" class="form-control with-icon"
                           placeholder="Enter your email" required>
                </div>
                <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                       class="text-danger"></small>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" th:field="*{password}" class="form-control with-icon"
                           placeholder="Create a password" required>
                </div>
                <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                       class="text-danger"></small>
                <div class="hint">Minimum 6 characters. First user becomes Admin.</div>
            </div>
            <button type="submit" class="btn-primary-custom">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a th:href="@{/auth/login}">Sign in</a>
        </div>
    </div>
</body>
</html>
