<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task — TaskFlow</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6c63ff; --secondary: #3f37c9; --accent: #f72585; --dark: #1a1a2e; --surface: #16213e; }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .form-card { background: var(--surface); border: 1px solid rgba(108,99,255,0.3); border-radius: 20px; padding: 36px; width: 100%; max-width: 560px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .form-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
        .form-title span { color: var(--primary); }
        .form-control, .form-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 8px;
            padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(108,99,255,0.1);
            border-color: var(--primary);
            color: #fff;
            box-shadow: none;
        }
        .form-select option { background: #16213e; }
        .form-label { color: #bbb; font-size: 0.85rem; font-weight: 600; }
        .btn-submit { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; padding: 11px 28px; color: white; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
        .btn-submit:hover { transform: translateY(-1px); }
        .btn-cancel { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 11px 20px; color: #aaa; text-decoration: none; font-size: 0.9rem; }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="form-title">Edit <span>Task</span></div>
        <p style="color:#666; font-size:0.85rem; margin-bottom:24px;">
            Board: <span th:text="${board.name}" style="color:#aaa;"></span>
        </p>

        <form th:action="@{/boards/{bid}/tasks/{tid}/edit(bid=${board.id}, tid=${taskDTO.id})}"
              th:object="${taskDTO}" method="post">
            <div class="mb-3">
                <label class="form-label">Title *</label>
                <input type="text" th:field="*{title}" class="form-control"
                       placeholder="Task title" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="4"
                          placeholder="Describe the task..."></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option value="TODO">📋 To Do</option>
                        <option value="IN_PROGRESS">⚡ In Progress</option>
                        <option value="DONE">✅ Done</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Priority</label>
                    <select th:field="*{priority}" class="form-select">
                        <option value="LOW">🟢 Low</option>
                        <option value="MEDIUM">🟡 Medium</option>
                        <option value="HIGH">🔴 High</option>
                        <option value="URGENT">🚨 Urgent</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Assignee</label>
                    <select th:field="*{assigneeId}" class="form-select">
                        <option value="">-- Unassigned --</option>
                        <option th:each="member : ${allUsers}"
                                th:value="${member.id}"
                                th:text="${member.username}">user</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Due Date</label>
                    <input type="date" th:field="*{dueDate}" class="form-control">
                </div>
            </div>
            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-save me-1"></i>Save Changes
                </button>
                <a th:href="@{/boards/{id}(id=${board.id})}" class="btn-cancel">
                    <i class="fas fa-times me-1"></i>Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
